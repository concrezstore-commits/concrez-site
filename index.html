<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONCREZ | Streetwear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-brand { font-family: 'Archivo Black', sans-serif; }
        .border-zinc { border-color: #18181b; }
        .bg-card { background-color: #09090b; }
    </style>
</head>
<body>

    <nav class="py-6 px-6 border-b border-zinc flex justify-between items-center">
        <span class="font-brand text-2xl tracking-tighter uppercase italic text-red-600">CONCREZ</span>
        <div class="flex gap-4">
            <a href="https://www.instagram.com/concrez.wear" class="text-[10px] font-black uppercase border border-white px-3 py-1 hover:bg-white hover:text-black transition">Instagram</a>
        </div>
    </nav>

    <section class="py-24 px-6 text-center">
        <h1 class="font-brand text-5xl md:text-8xl uppercase italic leading-none tracking-tighter mb-8">
            CONCREZ <br> <span class="text-zinc-800">ALWAYS WITH GOD 🙏🏼.</span>
        </h1>
        <p class="text-zinc-500 text-xs font-bold uppercase tracking-[0.3em]">Jales - São Paulo - Brasil</p>
    </section>

    <section class="py-12 px-4 bg-zinc-950">
        <div class="max-w-6xl mx-auto">
            <h2 class="font-brand text-xl uppercase mb-10 border-l-4 border-red-600 pl-4">Drops Disponíveis</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                
                <div class="bg-card border border-zinc p-3 group">
                    <div class="aspect-[3/4] bg-zinc-900 overflow-hidden mb-4">
                        <img src="CAMISA CONCREZ SCARFACE.jpg" alt="Camisa Concrez" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition">
                    </div>
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-brand text-sm uppercase italic">Camisa Concrez Scarface</h3>
                            <p class="text-zinc-500 text-[10px] font-bold uppercase">10 em Estoque</p>
                        </div>
                        <span class="text-red-600 font-black text-sm">R$ 95,00</span>
                    </div>
                    <a href="https://wa.me/5517999999999" class="block w-full bg-white text-black text-center py-4 font-black uppercase text-[10px] hover:bg-red-600 hover:text-white transition">Comprar via WhatsApp</a>
                </div>

                <div class="bg-card border border-zinc p-3 group">
                    <div class="aspect-[3/4] bg-zinc-900 overflow-hidden mb-4">
                        <img src="CAMISA CONCREZ BÁSICA.jpg" alt="Camisa Concrez" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition">
                    </div>
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-brand text-sm uppercase italic">Camisa Concrez Basic</h3>
                            <p class="text-zinc-500 text-[10px] font-bold uppercase">5 em Estoque!!</p>
                        </div>
                        <span class="text-red-600 font-black text-sm">R$ 65,00</span>
                    </div>
                    <a href="https://wa.me/5517999999999" class="block w-full bg-white text-black text-center py-4 font-black uppercase text-[10px] hover:bg-red-600 hover:text-white transition">Comprar via WhatsApp</a>
                </div>

            </div>
        </div>
    </section>

    <footer class="py-20 px-6 border-t border-zinc text-center">
        <p class="text-zinc-700 text-[9px] font-black uppercase tracking-[0.5em] mb-4">CONCREZ WEAR © 2026</p>
        <p class="text-zinc-500 text-[10px] font-bold uppercase italic">A visão de quem sabe onde quer chegar.</p>
    </footer>

</body>
</html>
