<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONCREZ | Sound & Wear Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        .font-hype { font-family: 'Archivo Black', sans-serif; }
        #main-content { transition: filter 1.2s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .site-blur { filter: blur(30px); pointer-events: none; }
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; cursor: pointer; transition: 0.8s; }
        .loader-hidden { opacity: 0 !important; visibility: hidden !important; }
        #productModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.98); z-index: 9999; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(10px); }
        .size-btn { border: 1px solid #27272a; padding: 15px; font-weight: 900; transition: 0.3s; width: 100%; text-align: center; }
        .size-btn.active { background-color: #dc2626; border-color: #dc2626; color: white; }
    </style>
</head>
<body id="inicio">

    <div id="preloader" onclick="entrarNoSite()">
        <h1 class="font-hype text-6xl md:text-9xl text-red-600 italic uppercase tracking-tighter">CONCREZ</h1>
        <p class="mt-8 text-[9px] tracking-[0.8em] font-black text-zinc-700 animate-pulse uppercase">Always with God.</p>
    </div>

    <div id="main-content" class="site-blur">
        <nav class="py-6 px-10 border-b border-zinc-900 flex justify-between items-center sticky top-0 bg-black/95 backdrop-blur-md z-50">
            <button class="font-hype text-4xl italic text-red-600 uppercase tracking-tighter">CONCREZ</button>
            <a href="https://www.instagram.com/concrez.br" target="_blank" class="text-[10px] font-black uppercase border border-white px-6 py-3 hover:bg-white hover:text-black transition">IG: @CONCREZ.BR</a>
        </nav>

        <section id="votacao" class="py-24 px-4 bg-zinc-950 border-b border-zinc-900">
            <div class="max-w-5xl mx-auto text-center">
                <h2 class="font-hype text-5xl text-red-600 italic mb-4 uppercase">VOTE NO PRÓXIMO DROP</h2>
                <p class="text-zinc-500 font-black text-[10px] tracking-[0.4em] mb-12 uppercase">ESCOLHA ATÉ 2 PEÇAS QUE VOCÊ QUER PRIMEIRO</p>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-black border border-zinc-800 p-8 rounded hover:border-red-600 transition">
                        <h3 class="font-hype text-xl mb-4 italic uppercase">SCARFACE V2</h3>
                        <p class="text-white text-5xl font-black mb-6" id="votos-scarface">0</p>
                        <button onclick="votar('scarface')" id="btn-scarface" class="w-full bg-white text-black py-4 font-black text-[10px] uppercase hover:bg-red-600 hover:text-white transition">VOTAR</button>
                    </div>
                    <div class="bg-black border border-zinc-800 p-8 rounded hover:border-red-600 transition">
                        <h3 class="font-hype text-xl mb-4 italic uppercase">GHOST EDITION</h3>
                        <p class="text-white text-5xl font-black mb-6" id="votos-ghost">0</p>
                        <button onclick="votar('ghost')" id="btn-ghost" class="w-full bg-white text-black py-4 font-black text-[10px] uppercase hover:bg-red-600 hover:text-white transition">VOTAR</button>
                    </div>
                    <div class="bg-black border border-zinc-800 p-8 rounded hover:border-red-600 transition">
                        <h3 class="font-hype text-xl mb-4 italic uppercase">ALWAYS WITH GOD</h3>
                        <p class="text-white text-5xl font-black mb-6" id="votos-god">0</p>
                        <button onclick="votar('god')" id="btn-god" class="w-full bg-white text-black py-4 font-black text-[10px] uppercase hover:bg-red-600 hover:text-white transition">VOTAR</button>
                    </div>
                </div>
            </div>
        </section>

        <footer class="py-20 text-center bg-black border-t border-zinc-900">
            <p class="text-zinc-600 text-[10px] font-black uppercase tracking-[1em]">CONCREZ WEAR © 2026 | JALES-SP</p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Dados extraídos do seu print
        const firebaseConfig = {
            apiKey: "AIzaSyA8KA7BSNhHaoCzvFStA-ea6JhLEJofARB",
            authDomain: "concrez.firebaseapp.com",
            projectId: "concrez",
            storageBucket: "concrez.firebasestorage.app",
            messagingSenderId: "765598113178",
            appId: "1:765598113178:web:15abd36b763ce00ac9ee23",
            databaseURL: "https://concrez-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let meusVotosCount = 0;

        // Atualiza votos na tela em tempo real
        const ids = ['scarface', 'ghost', 'god'];
        ids.forEach(id => {
            onValue(ref(db, 'votos/' + id), (snap) => {
                document.getElementById('votos-' + id).innerText = snap.val() || 0;
            });
        });

        // Função para votar
        window.votar = function(id) {
            if (meusVotosCount >= 2) {
                alert("VOCÊ JÁ VOTOU EM 2 MODELOS!");
                return;
            }
            runTransaction(ref(db, 'votos/' + id), (atual) => (atual || 0) + 1).then(() => {
                meusVotosCount++;
                const b = document.getElementById('btn-' + id);
                b.disabled = true; b.innerText = "VOTADO"; b.style.opacity = "0.5";
            });
        };
    </script>

    <script>
        function entrarNoSite() {
            document.getElementById('preloader').classList.add('loader-hidden');
            document.getElementById('main-content').classList.remove('site-blur');
        }
    </script>
</body>
</html>
